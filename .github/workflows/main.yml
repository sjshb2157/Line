name: Build MediaPipe SO

on:
  workflow_dispatch:
    inputs:
      mediapipe_version:
        description: 'MediaPipe 版本 tag'
        required: true
        default: 'v0.10.35'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git unzip zip curl wget \
            openjdk-17-jdk build-essential binutils
          python3 -m pip install --user numpy

      - name: 安装 Bazel 6.5.0
        run: |
          curl -fsSL https://bazel.build/bazel-release.pub.gpg \
            | gpg --dearmor > bazel.gpg
          sudo mv bazel.gpg /etc/apt/trusted.gpg.d/
          echo "deb [arch=amd64] https://storage.googleapis.com/bazel-apt stable jdk1.8" \
            | sudo tee /etc/apt/sources.list.d/bazel.list
          sudo apt-get update && sudo apt-get install -y bazel-6.5.0
          sudo ln -sf /usr/bin/bazel-6.5.0 /usr/bin/bazel
          bazel --version

      - name: 安装 Android SDK 35 和 NDK r28b
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdtools
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdtools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.1.13356709"

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/28.1.13356709" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Clone MediaPipe 源码
        run: |
          git clone --depth 1 \
            --branch ${{ github.event.inputs.mediapipe_version }} \
            https://github.com/google-ai-edge/mediapipe.git

      - name: 配置 WORKSPACE
        run: |
          cd mediapipe
          cat >> WORKSPACE <<'EOF'

          android_sdk_repository(name = "androidsdk")
          android_ndk_repository(name = "androidndk", api_level = 21)
          bind(name = "android/crosstool", actual = "@androidndk//:toolchain")
          EOF

      - name: 编译 tasks_vision (含 native .so)
        run: |
          cd mediapipe
          # 编上层 tasks_vision target；--fat_apk_cpu 显式指定 ABI，确保 dummy app 真正编出 arm64 native
          bazel build -c opt \
            --config=android_arm64 \
            --fat_apk_cpu=arm64-v8a \
            --define MEDIAPIPE_DISABLE_OPENCV=1 \
            --define EXCLUDE_OPENCV_SO_LIB=1 \
            //mediapipe/tasks/java/com/google/mediapipe/tasks/vision:tasks_vision

          echo "bazel-bin 真实路径: $(readlink -f bazel-bin)"
        timeout-minutes: 120

      - name: 提取 .so + 校验
        run: |
          cd mediapipe
          mkdir -p ../output

          echo "=== 全盘列出 dummy apk / aar / so ==="
          find -L bazel-bin -name "*dummy_app_unsigned.apk" 2>/dev/null | sort
          find -L bazel-bin -name "tasks_vision*.aar" 2>/dev/null | sort
          find -L bazel-bin -name "*.so" 2>/dev/null | grep -i vision | sort

          # 来源 1（最可靠）：dummy apk 里的 lib/arm64-v8a/
          echo "=== 从 dummy apk 提取 ==="
          APK=$(find -L bazel-bin -name "*tasks_vision*dummy_app_unsigned.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "apk: $APK"
            rm -rf apk_x && mkdir apk_x
            unzip -o "$APK" "lib/*" -d apk_x >/dev/null 2>&1 || true
            find apk_x -name "*.so" ! -name "*_dummy_app.so" -print \
              -exec cp {} ../output/ \;
          else
            echo "未找到 dummy apk"
          fi

          # 来源 2（备用）：最终 aar 的 jni/
          echo "=== 从 aar 提取（备用） ==="
          AAR=$(find -L bazel-bin -name "tasks_vision.aar" 2>/dev/null | head -1)
          if [ -n "$AAR" ] && [ -z "$(ls ../output/*.so 2>/dev/null)" ]; then
            rm -rf aar_x && mkdir aar_x
            unzip -o "$AAR" -d aar_x >/dev/null 2>&1 || true
            find aar_x -path "*jni*" -name "*.so" -print -exec cp {} ../output/ \;
          fi

          echo "=== 校验产物 ==="
          cd ../output
          ls -lh || echo "(空)"
          for f in *.so; do
            [ -f "$f" ] || { echo "::error::没提取到任何 .so，请把上面 find 输出贴出来"; exit 1; }
            echo "----- $f -----"
            file "$f"
            echo "[NEEDED 依赖] (应无 opencv / 无 pairipcore):"
            readelf -d "$f" | grep NEEDED
            echo "[NDK note]:"
            readelf -n "$f" 2>/dev/null | grep -iA1 android || true
            echo "[16K 对齐检查] (应出现 2**14):"
            readelf -lW "$f" 2>/dev/null | grep LOAD | head -2
            echo "[导出 Java_ 符号数]:"
            nm -D --defined-only "$f" 2>/dev/null | grep -c "Java_" || true
            nm -D --defined-only "$f" 2>/dev/null | grep "Java_" | awk '{print $NF}' | sort -u > "$f.symbols.txt"
          done

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-so-${{ github.event.inputs.mediapipe_version }}
          path: |
            output/*.so
            output/*.symbols.txt
          retention-days: 7
