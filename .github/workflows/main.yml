name: Build MediaPipe SO

on:
  workflow_dispatch:
    inputs:
      mediapipe_version:
        description: 'MediaPipe 版本 tag (原库版本反推不出，先用最新；编完用符号 diff 校验)'
        required: true
        default: 'v0.10.35'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git unzip curl wget \
            openjdk-17-jdk build-essential binutils
          python3 -m pip install --user numpy

      - name: 安装 Bazel 6.5.0
        run: |
          curl -fsSL https://bazel.build/bazel-release.pub.gpg \
            | gpg --dearmor > bazel.gpg
          sudo mv bazel.gpg /etc/apt/trusted.gpg.d/
          echo "deb [arch=amd64] https://storage.googleapis.com/bazel-apt stable jdk1.8" \
            | sudo tee /etc/apt/sources.list.d/bazel.list
          sudo apt-get update && sudo apt-get install -y bazel-6.5.0
          sudo ln -sf /usr/bin/bazel-6.5.0 /usr/bin/bazel
          bazel --version

      - name: 安装 Android SDK 35 和 NDK r28b
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdtools
          mkdir -p $HOME/android-sdk/cmdline-tools
          mv cmdtools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.1.13356709"

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/28.1.13356709" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Clone MediaPipe 源码
        run: |
          git clone --depth 1 \
            --branch ${{ github.event.inputs.mediapipe_version }} \
            https://github.com/google-ai-edge/mediapipe.git

      - name: 配置 WORKSPACE
        run: |
          cd mediapipe
          cat >> WORKSPACE <<'EOF'

          android_sdk_repository(name = "androidsdk")
          android_ndk_repository(name = "androidndk", api_level = 21)
          bind(name = "android/crosstool", actual = "@androidndk//:toolchain")
          EOF

      - name: 编译 libmediapipe_tasks_vision_jni.so
        run: |
          cd mediapipe
          bazel build -c opt \
            --config=android_arm64 \
            --define EXCLUDE_OPENCV_SO_LIB=1 \
            --define MEDIAPIPE_DISABLE_OPENCV=1 \
            --linkopt=-s \
            //mediapipe/tasks/java/com/google/mediapipe/tasks/vision:tasks_vision
          echo "bazel-bin 真实路径: $(readlink -f bazel-bin)"
        timeout-minutes: 120

      - name: 收集产物 + 导出符号清单
        run: |
          mkdir -p output

          BAZEL_BIN=$(readlink -f mediapipe/bazel-bin)
          echo "实际 bazel-bin 路径: $BAZEL_BIN"

          echo "=== 所有 .so ==="
          find -L "$BAZEL_BIN" -name "*.so" 2>/dev/null | sort

          echo "=== 所有 .aar ==="
          find -L "$BAZEL_BIN" -name "*.aar" 2>/dev/null | sort

          echo "=== 直接复制 .so ==="
          find -L "$BAZEL_BIN" -name "libmediapipe_tasks_vision_jni.so" \
            -exec cp {} output/ \; -print

          echo "=== 从 AAR 提取 .so ==="
          find -L "$BAZEL_BIN" -name "*.aar" | while read aar; do
            echo "处理: $aar"
            tmpdir=$(mktemp -d)
            unzip -q "$aar" -d "$tmpdir"
            find "$tmpdir" -name "*.so" | while read f; do
              echo "  提取: $f"
              cp "$f" output/
            done
            rm -rf "$tmpdir"
          done

          echo "=== output 目录内容 ==="
          ls -lh output/ || echo "(空)"

          echo "=== 符号分析 ==="
          for f in output/*.so; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            file "$f"
            readelf -d "$f" 2>/dev/null | grep NEEDED || true
            nm -D --defined-only "$f" 2>/dev/null \
              | grep "Java_" | awk '{print $NF}' | sort -u \
              > "${f}.symbols.txt" || true
            echo "导出 Java_ 符号数: $(wc -l < ${f}.symbols.txt)"
          done

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: mediapipe-so-${{ github.event.inputs.mediapipe_version }}
          path: |
            output/*.so
            output/*.symbols.txt
          retention-days: 7
